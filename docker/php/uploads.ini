; [railway-prod] Raise PHP upload/body limits for the admin DOCX template
; import. PHP's defaults (upload_max_filesize=2M, post_max_size=8M) are below
; nginx's client_max_body_size (30m), so without this a large DOCX would be
; rejected by PHP after nginx had already accepted the body. Keep both at 30M
; to match the nginx limit.
upload_max_filesize = 30M
post_max_size = 30M

; Hardening: stock php.ini-production leaves expose_php = On (only display_errors
; etc. are hardened). Drop the X-Powered-By: PHP/... version header so the exact
; PHP version isn't advertised to every client.
expose_php = Off
